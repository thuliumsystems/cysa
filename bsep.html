<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BSEP Quiz</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  margin:0;
  padding:20px;
}
.container {
  max-width:700px;
  margin:auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}
h1 { text-align:center; }

.word {
  font-size:26px;
  margin-bottom:10px;
  color:#38bdf8;
}

.btn {
  display:block;
  width:100%;
  margin:8px 0;
  padding:10px;
  background:#1f2937;
  border:1px solid #334155;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.btn:hover { background:#334155; }

.feedback {
  margin-top:15px;
  font-weight:bold;
}

.progress {
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>BSEP Word Quiz</h1>

  <div class="progress" id="progress"></div>
  <div class="word" id="word">Loading...</div>
  <div id="options"></div>
  <div class="feedback" id="feedback"></div>

  <button class="btn" onclick="nextQuestion()">Next</button>
</div>

<script>
let questions = [];
let index = 0;
let score = 0;

fetch("bsep_questions.json")
  .then(res => res.json())
  .then(data => {
    // suporta formato novo: []
    if (Array.isArray(data)) {
      questions = data;
    } else {
      questions = Object.values(data).flat();
    }

    loadQuestion();
  });

function loadQuestion(){
  let q = questions[index];

  document.getElementById("word").innerText = q.word;
  document.getElementById("progress").innerText =
    `Question ${index+1} of ${questions.length}`;

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  document.getElementById("feedback").innerText = "";

  let shuffled = [...q.options].sort(() => Math.random() - 0.5);

  shuffled.forEach(opt=>{
    let btn = document.createElement("button");
    btn.className="btn";
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(opt);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(choice){
  let q = questions[index];
  let feedback = document.getElementById("feedback");

  if(choice === q.answer){
    score++;
    feedback.innerHTML =
      "✅ Correct!<br><br><b>Definition:</b> " + q.definition;
  } else {
    feedback.innerHTML =
      "❌ Wrong!<br><b>Correct answer:</b> " + q.answer +
      "<br><br><b>Definition:</b> " + q.definition;
  }
}

function nextQuestion(){
  index++;

  if(index >= questions.length){
    document.getElementById("word").innerText = "Finished!";
    document.getElementById("options").innerHTML = "";
    document.getElementById("progress").innerText =
      `Score: ${score}/${questions.length}`;
    document.getElementById("feedback").innerText = "";
    return;
  }

  loadQuestion();
}
</script>

</body>
</html>
