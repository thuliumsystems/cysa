<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math — BSEP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: linear-gradient(135deg, #070b17, #111827);
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 24px;
      }
      .container {
        width: 100%;
        max-width: 720px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-bottom: 40px;
      }
      .back {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #64748b;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        transition: color 0.2s;
        margin-bottom: 4px;
      }
      .back:hover { color: #34d399; }
      .back svg { width: 16px; height: 16px; }
      h1 {
        font-size: 22px;
        font-weight: 800;
        background: linear-gradient(135deg, #34d399, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: #94a3b8;
      }
      .source-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        margin-left: 6px;
      }
      .source-badge.official { background: rgba(52, 211, 153, 0.1); color: #34d399; }
      .source-badge.official-material { background: rgba(52, 211, 153, 0.1); color: #34d399; }
      .source-badge.non-official { background: rgba(234, 179, 8, 0.1); color: #eab308; }
      .source-badge.non-official-material { background: rgba(234, 179, 8, 0.1); color: #eab308; }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: #34d399;
      }

      .start-screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 20px;
        padding: 48px 24px;
      }
      .start-screen .icon { font-size: 56px; }
      .start-screen h2 { font-size: 24px; font-weight: 700; }
      .start-screen p { color: #94a3b8; font-size: 14px; line-height: 1.6; max-width: 400px; }
      .btn-start {
        padding: 16px 56px;
        font-size: 17px;
        font-family: inherit;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #059669, #06b6d4);
        transition: all 0.25s;
      }
      .btn-start:hover {
        filter: brightness(1.15);
        box-shadow: 0 8px 32px rgba(5, 150, 105, 0.35);
        transform: translateY(-2px);
      }
      .btn-start:active { transform: scale(0.97); }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        width: 100%;
        max-width: 480px;
      }
      @media (max-width: 480px) {
        .category-grid { grid-template-columns: 1fr; }
      }
      .category-card {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 14px;
        padding: 18px 16px;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .category-card:hover { border-color: #34d399; transform: translateY(-2px); }
      .category-card .cat-icon { font-size: 22px; }
      .category-card .cat-name { font-size: 14px; font-weight: 700; color: #e2e8f0; }
      .category-card .cat-count { font-size: 12px; color: #64748b; }
      .category-card .cat-progress { font-size: 11px; font-weight: 600; color: #34d399; }
      .back-to-categories {
        background: none;
        border: none;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        padding: 0;
        margin-bottom: 4px;
      }
      .back-to-categories:hover { color: #34d399; }

      .quiz-content { display: none; flex-direction: column; }

      .question-card {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 14px;
        padding: 20px 22px;
        margin-bottom: 14px;
        transition: border-color 0.2s;
      }
      .question-card .q-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      .question-card .q-number {
        font-size: 13px;
        font-weight: 700;
        color: #34d399;
        margin-right: auto;
      }
      .question-card .q-status {
        font-size: 12px;
        font-weight: 700;
        padding: 2px 10px;
        border-radius: 999px;
      }
      .question-card .q-status.correct { color: #22c55e; background: rgba(34,197,94,0.1); }
      .question-card .q-status.wrong { color: #ef4444; background: rgba(239,68,68,0.1); }

      .card-question {
        font-size: 15px;
        line-height: 1.7;
        color: #cbd5e1;
        margin-bottom: 12px;
      }
      .card-question .katex { font-size: 1.05em; }
      .card-options { display: flex; flex-direction: column; gap: 8px; }
      .btn {
        width: 100%;
        padding: 13px 16px;
        font-size: 14px;
        font-family: inherit;
        background: #1a2332;
        border: 1px solid #1e293b;
        color: #e2e8f0;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
      }
      .btn:hover { background: #1e293b; border-color: #334155; }
      .btn:active { transform: scale(0.98); }
      .btn.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.08); color: #22c55e; }
      .btn.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.08); color: #ef4444; }
      .card-feedback {
        margin-top: 10px;
        padding: 12px 14px;
        background: #1a2332;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.6;
        display: none;
      }
      .card-feedback.show { display: block; }
      .card-feedback .katex { font-size: 1.05em; }

      .answered-count {
        text-align: center;
        font-size: 12px;
        color: #64748b;
        margin-bottom: 4px;
      }

      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 14px;
        padding: 8px 0 4px;
      }
      .page-btn {
        padding: 10px 24px;
        font-size: 14px;
        font-family: inherit;
        font-weight: 600;
        border: 1px solid #334155;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        color: #e2e8f0;
        background: #1a2332;
      }
      .page-btn:hover { background: #1e293b; }
      .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
      .page-info {
        font-size: 14px;
        font-weight: 600;
        color: #94a3b8;
        min-width: 100px;
        text-align: center;
      }

      .btn-reset {
        padding: 10px 28px;
        font-size: 14px;
        font-family: inherit;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        color: #fff;
        background: #dc2626;
      }
      .btn-reset:hover { filter: brightness(1.15); }
      .btn-reset:active { transform: scale(0.97); }

      .finished { text-align: center; padding: 40px 0; }
      .finished h2 { font-size: 28px; margin-bottom: 8px; }
      .finished p { font-size: 18px; color: #94a3b8; }

      @media (max-width: 400px) {
        .card-question { font-size: 13px; }
        .btn { font-size: 13px; padding: 11px 13px; }
        .question-card { padding: 15px 16px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a class="back" href="../">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to Menu
      </a>
      <h1>Math</h1>

      <div class="start-screen" id="startScreen">
        <div class="icon">📐</div>
        <h2>Choose a category</h2>
        <p><strong id="totalQuestions">0</strong> math problems in total, grouped by topic. Pick one to begin.</p>
        <div class="category-grid" id="categoryGrid"></div>
      </div>

      <div class="quiz-content" id="quizContent">
        <button class="back-to-categories" onclick="backToCategories()">← Back to categories</button>
        <div class="meta">
          <span id="progress">Loading...</span>
          <span><span class="timer" id="timerDisplay">00:00</span></span>
        </div>

        <div id="questionsContainer"></div>
        <div class="answered-count" id="answeredCount"></div>
        <div class="pagination">
          <button class="page-btn" id="prevPageBtn" onclick="prevPage()">← Previous</button>
          <span class="page-info" id="pageInfo"></span>
          <button class="page-btn" id="nextPageBtn" onclick="nextPage()">Next →</button>
        </div>
        <div style="text-align:center;margin-top:8px;">
          <button class="btn-reset" onclick="resetProgress()">Reset</button>
        </div>
      </div>
    </div>

    <script>
      var PER_PAGE = 10;
      var CATEGORIES = [
        { key: 'percentage', icon: '%', name: 'Percentage' },
        { key: 'fraction-addition', icon: '➕', name: 'Fraction Addition' },
        { key: 'fraction-subtraction', icon: '➖', name: 'Fraction Subtraction' },
        { key: 'fraction-multiplication', icon: '✖️', name: 'Fraction Multiplication' },
        { key: 'fraction-division', icon: '➗', name: 'Fraction Division' },
        { key: 'area', icon: '◻️', name: 'Area' },
        { key: 'perimeter', icon: '⬛', name: 'Perimeter' },
        { key: 'general', icon: '🧮', name: 'General / Mixed' }
      ];

      function classify(q) {
        var m = /Concept:\s*([^.}]+)/i.exec(q.definition || '');
        var c = (m ? m[1] : '').toLowerCase();
        if (c.indexOf('percent') !== -1) return 'percentage';
        if (c.indexOf('perimeter') !== -1 || c.indexOf('circumference') !== -1) return 'perimeter';
        if (c.indexOf('area') !== -1) return 'area';
        if (c.indexOf('fraction') !== -1 || c.indexOf('mixed number') !== -1) {
          if (c.indexOf('addition') !== -1 || c.indexOf('adding') !== -1) return 'fraction-addition';
          if (c.indexOf('subtraction') !== -1 || c.indexOf('subtract') !== -1 || c.indexOf('borrow') !== -1 || c.indexOf('remaining') !== -1) return 'fraction-subtraction';
          if (c.indexOf('multipl') !== -1 || c.indexOf('of a') !== -1) return 'fraction-multiplication';
          if (c.indexOf('divi') !== -1) return 'fraction-division';
          return 'general';
        }
        return 'general';
      }

      var allQuestions = [];
      var questions = [];
      var currentCategory = null;
      var currentPage = 0;
      var score = 0;
      var done = new Set();
      var correctAnswers = new Set();
      var timerInterval = null;
      var elapsedSeconds = 0;
      var quizStarted = false;
      var STORAGE_PREFIX = 'bsep_math_';
      var shuffledOptions = {};

      function saveProgress() {
        localStorage.setItem(STORAGE_PREFIX + 'page', currentPage);
        localStorage.setItem(STORAGE_PREFIX + 'score', score);
        localStorage.setItem(STORAGE_PREFIX + 'done', JSON.stringify(Array.from(done)));
        localStorage.setItem(STORAGE_PREFIX + 'correct', JSON.stringify(Array.from(correctAnswers)));
        localStorage.setItem(STORAGE_PREFIX + 'elapsed', elapsedSeconds);
        localStorage.setItem(STORAGE_PREFIX + 'started', quizStarted ? '1' : '0');
        if (currentCategory) localStorage.setItem('bsep_math_active', currentCategory);
      }

      function loadProgress() {
        currentPage = parseInt(localStorage.getItem(STORAGE_PREFIX + 'page')) || 0;
        score = parseInt(localStorage.getItem(STORAGE_PREFIX + 'score')) || 0;
        elapsedSeconds = parseInt(localStorage.getItem(STORAGE_PREFIX + 'elapsed')) || 0;
        quizStarted = localStorage.getItem(STORAGE_PREFIX + 'started') === '1';
        var savedDone = localStorage.getItem(STORAGE_PREFIX + 'done');
        if (savedDone) done = new Set(JSON.parse(savedDone));
        var savedCorrect = localStorage.getItem(STORAGE_PREFIX + 'correct');
        if (savedCorrect) correctAnswers = new Set(JSON.parse(savedCorrect));
      }

      function formatTime(sec) {
        var m = String(Math.floor(sec / 60)).padStart(2, '0');
        var s = String(sec % 60).padStart(2, '0');
        return m + ':' + s;
      }

      function updateTimerDisplay() {
        document.getElementById('timerDisplay').textContent = formatTime(elapsedSeconds);
      }

      function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(function() {
          elapsedSeconds++;
          updateTimerDisplay();
          saveProgress();
        }, 1000);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function totalPages() {
        return Math.ceil(questions.length / PER_PAGE);
      }

      function getPageRange(page) {
        var start = page * PER_PAGE;
        var end = Math.min(start + PER_PAGE, questions.length);
        return { start: start, end: end };
      }

      function getShuffledOptions(idx) {
        if (!shuffledOptions[idx]) {
          shuffledOptions[idx] = questions[idx].options.slice().sort(function() { return Math.random() - 0.5; });
        }
        return shuffledOptions[idx];
      }

      function esc(s) {
        return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function renderMathInContainer(el) {
        if (typeof renderMathInElement === 'function') {
          renderMathInElement(el, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '\\(', right: '\\)', display: false}
            ],
            throwOnError: false
          });
        }
      }

      function categoryProgress(key) {
        var prefix = 'bsep_math_' + key + '_';
        var savedDone = localStorage.getItem(prefix + 'done');
        var count = savedDone ? JSON.parse(savedDone).length : 0;
        var started = localStorage.getItem(prefix + 'started') === '1';
        return { count: count, started: started };
      }

      function renderCategoryGrid() {
        var grid = document.getElementById('categoryGrid');
        grid.innerHTML = '';
        CATEGORIES.forEach(function(cat) {
          var items = allQuestions.filter(function(q) { return classify(q) === cat.key; });
          if (items.length === 0) return;
          var prog = categoryProgress(cat.key);
          var card = document.createElement('div');
          card.className = 'category-card';
          var statusText = 'Not started';
          if (prog.started && prog.count >= items.length) statusText = 'Completed ✓';
          else if (prog.started) statusText = prog.count + ' / ' + items.length + ' answered';
          card.innerHTML =
            '<span class="cat-icon">' + cat.icon + '</span>' +
            '<span class="cat-name">' + esc(cat.name) + '</span>' +
            '<span class="cat-count">' + items.length + ' questions</span>' +
            '<span class="cat-progress">' + statusText + '</span>';
          card.addEventListener('click', function() { enterCategory(cat.key); });
          grid.appendChild(card);
        });
      }

      fetch('questions.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          allQuestions = Array.isArray(data) ? data : Object.values(data).flat();
          document.getElementById('totalQuestions').textContent = allQuestions.length;
          renderCategoryGrid();
          var active = localStorage.getItem('bsep_math_active');
          if (active) {
            currentCategory = active;
            STORAGE_PREFIX = 'bsep_math_' + active + '_';
            questions = allQuestions.filter(function(q) { return classify(q) === active; });
            loadProgress();
            if (quizStarted && questions.length && currentPage < totalPages()) {
              document.getElementById('startScreen').style.display = 'none';
              document.getElementById('quizContent').style.display = 'flex';
              updateTimerDisplay();
              renderPage(currentPage);
              startTimer();
            }
          }
        });

      function enterCategory(key) {
        currentCategory = key;
        STORAGE_PREFIX = 'bsep_math_' + key + '_';
        questions = allQuestions.filter(function(q) { return classify(q) === key; });
        shuffledOptions = {};
        loadProgress();
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('quizContent').style.display = 'flex';
        quizStarted = true;
        if (done.size === 0) elapsedSeconds = 0;
        updateTimerDisplay();
        saveProgress();
        startTimer();
        renderPage(currentPage < totalPages() ? currentPage : 0);
      }

      function backToCategories() {
        stopTimer();
        document.getElementById('quizContent').style.display = 'none';
        document.getElementById('startScreen').style.display = 'flex';
        renderCategoryGrid();
      }

      function createQuestionCard(idx) {
        var q = questions[idx];
        var isAnswered = done.has(idx);
        var isCorrect = correctAnswers.has(idx);

        var card = document.createElement('div');
        card.className = 'question-card';
        card.id = 'q-card-' + idx;

        var html = '<div class="q-header"><span class="q-number">Question ' + (idx + 1) + '</span>';
        if (q.source) {
          var srcClass = q.source.toLowerCase().replace(/\s+/g, '-');
          html += '<span class="source-badge ' + esc(srcClass) + '">' + esc(q.source) + '</span>';
        }
        if (isAnswered) {
          html += '<span class="q-status ' + (isCorrect ? 'correct' : 'wrong') + '">' + (isCorrect ? 'Correct' : 'Wrong') + '</span>';
        }
        html += '</div>';
        html += '<div class="card-question">' + (q.question || '') + '</div>';
        html += '<div class="card-options"></div>';
        html += '<div class="card-feedback' + (isAnswered ? ' show' : '') + '"></div>';

        card.innerHTML = html;

        var optsContainer = card.querySelector('.card-options');
        var opts = getShuffledOptions(idx);
        opts.forEach(function(opt) {
          var btn = document.createElement('button');
          btn.className = 'btn';
          if (isAnswered && opt === q.answer) btn.classList.add('correct');
          btn.textContent = opt;
          if (isAnswered) {
            btn.disabled = true;
            btn.style.pointerEvents = 'none';
          } else {
            btn.addEventListener('click', (function(i, o) {
              return function() { checkAnswer(i, o); };
            })(idx, opt));
          }
          optsContainer.appendChild(btn);
        });

        if (isAnswered) {
          var fb = card.querySelector('.card-feedback');
          var statusLine = document.createElement('div');
          statusLine.style.fontWeight = '700';
          statusLine.style.marginBottom = '4px';
          statusLine.textContent = isCorrect ? '✅ Correct!' : '❌ Wrong!';
          fb.appendChild(statusLine);
          var defLine = document.createElement('div');
          defLine.style.color = '#22c55e';
          defLine.style.fontWeight = '600';
          defLine.innerHTML = q.definition || '';
          fb.appendChild(defLine);
        }

        return card;
      }

      function renderPage(page) {
        currentPage = page;
        var range = getPageRange(page);
        var container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        for (var i = range.start; i < range.end; i++) {
          container.appendChild(createQuestionCard(i));
        }
        renderMathInContainer(container);
        updatePagination();
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function checkAnswer(idx, choice) {
        if (done.has(idx)) return;
        var q = questions[idx];
        var correct = choice === q.answer;
        if (correct) {
          score++;
          correctAnswers.add(idx);
        }
        done.add(idx);
        saveProgress();
        var oldCard = document.getElementById('q-card-' + idx);
        if (oldCard) {
          var newCard = createQuestionCard(idx);
          oldCard.replaceWith(newCard);
          renderMathInContainer(newCard);
        }
        updatePagination();
        updateProgress();
      }

      function updatePagination() {
        var total = totalPages();
        var range = getPageRange(currentPage);
        var answeredOnPage = 0;
        for (var i = range.start; i < range.end; i++) {
          if (done.has(i)) answeredOnPage++;
        }
        document.getElementById('prevPageBtn').disabled = (currentPage === 0);
        document.getElementById('nextPageBtn').disabled = (currentPage >= total - 1);
        document.getElementById('pageInfo').textContent = 'Page ' + (currentPage + 1) + ' of ' + total;
        document.getElementById('answeredCount').textContent = answeredOnPage + ' / ' + (range.end - range.start) + ' answered on this page';
      }

      function nextPage() {
        if (currentPage < totalPages() - 1) renderPage(currentPage + 1);
      }

      function prevPage() {
        if (currentPage > 0) renderPage(currentPage - 1);
      }

      function updateProgress() {
        document.getElementById('progress').textContent =
          'Question ' + Math.min(done.size + 1, questions.length) + ' of ' + questions.length + ' | Score: ' + score;
        if (done.size >= questions.length) finish();
      }

      function finish() {
        stopTimer();
        var container = document.getElementById('questionsContainer');
        container.innerHTML = '<div class="finished"><h2>🎉 Finished!</h2><p>Score: ' + score + ' / ' + questions.length + '</p><p style="color:#94a3b8;">Time: ' + formatTime(elapsedSeconds) + '</p></div>';
        document.getElementById('answeredCount').style.display = 'none';
        document.getElementById('prevPageBtn').style.display = 'none';
        document.getElementById('nextPageBtn').style.display = 'none';
        document.getElementById('pageInfo').style.display = 'none';
        document.getElementById('progress').textContent = 'Final Score: ' + score + ' / ' + questions.length;
      }

      function resetProgress() {
        stopTimer();
        localStorage.removeItem(STORAGE_PREFIX + 'page');
        localStorage.removeItem(STORAGE_PREFIX + 'score');
        localStorage.removeItem(STORAGE_PREFIX + 'done');
        localStorage.removeItem(STORAGE_PREFIX + 'correct');
        localStorage.removeItem(STORAGE_PREFIX + 'elapsed');
        localStorage.removeItem(STORAGE_PREFIX + 'started');
        localStorage.removeItem('bsep_math_active');
        currentPage = 0; score = 0; done = new Set(); correctAnswers = new Set(); elapsedSeconds = 0; quizStarted = false;
        currentCategory = null;
        document.getElementById('startScreen').style.display = 'flex';
        document.getElementById('quizContent').style.display = 'none';
        updateTimerDisplay();
        renderCategoryGrid();
      }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  </body>
</html>
